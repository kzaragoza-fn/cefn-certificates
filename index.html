    // ============================================================
    // PDF GENERATION
    // ============================================================
    async function generatePDF(elementId, filename) {
      const el = document.getElementById(elementId);
      if (!el) return;
      // Wait for fonts to load
      if (document.fonts && document.fonts.ready) {
        await document.fonts.ready;
      }
      // Small delay to ensure rendering is complete
      await new Promise(r => setTimeout(r, 500));
      const canvas = await html2canvas(el, { scale: 2, useCORS: true, backgroundColor: "#ffffff", logging: false, allowTaint: true });
      const imgData = canvas.toDataURL("image/jpeg", 0.95);
      const pdf = new jspdf.jsPDF({ orientation: "landscape", unit: "px", format: [1056, 816] });
      pdf.addImage(imgData, "JPEG", 0, 0, 1056, 816);
      pdf.save(filename);
    }

    // ============================================================

    // ============================================================
    function CornerDecoration({ position }) {
      const transforms = { topLeft: "", topRight: "scaleX(-1)", bottomLeft: "scaleY(-1)", bottomRight: "scale(-1,-1)" };
      const positions = { topLeft: { top: 0, left: 0 }, topRight: { top: 0, right: 0 }, bottomLeft: { bottom: 0, left: 0 }, bottomRight: { bottom: 0, right: 0 } };
      return (
        <svg width="80" height="80" viewBox="0 0 80 80" style={{ position: "absolute", ...positions[position], transform: transforms[position] }}>
          <line x1="8" y1="8" x2="8" y2="72" stroke="#222" strokeWidth="2" />
          <line x1="14" y1="8" x2="14" y2="72" stroke="#222" strokeWidth="1.5" />

          <line x1="8" y1="8" x2="72" y2="8" stroke="#222" strokeWidth="2" />

          <line x1="8" y1="19" x2="72" y2="19" stroke="#222" strokeWidth="1" />
        </svg>
      );
    }

          </div>
        </div>
      );
    }

    // ============================================================
    // MAIN APP (Learner View Only - Production)
    // ============================================================
    function App() {
      const [downloading, setDownloading] = useState(false);
      const [error, setError] = useState(null);

      const params = new URLSearchParams(window.location.search);
      const data = {
        fullName: params.get("name") || "",
        webinarId: params.get("webinar") || "",
        creditType: params.get("credit") || "CE",
        format: params.get("format") || "live",
      };

      const webinar = WEBINAR_LOOKUP[data.webinarId];

      // No URL params = show info page
      if (!data.fullName || !data.webinarId) {
        return (
          <div style={{ minHeight: "100vh", background: "#f5f3ef", fontFamily: "'Work Sans', sans-serif" }}>
            <div style={{ background: "#500000", padding: "20px 32px", color: "#fff", textAlign: "center" }}>
              <h1 style={{ margin: 0, fontSize: "22px", fontFamily: "'Oswald', sans-serif", letterSpacing: "1px" }}>CEFN Certificate Generator</h1>
              <p style={{ margin: "4px 0 0", fontSize: "13px", opacity: 0.8 }}>Texas A&M Center of Excellence in Forensic Nursing</p>
            </div>
            <div style={{ maxWidth: "600px", margin: "60px auto", padding: "0 24px", textAlign: "center" }}>
              <h2 style={{ color: "#500000", fontSize: "24px", marginBottom: "16px" }}>Welcome</h2>
              <p style={{ color: "#555", lineHeight: 1.6, fontSize: "15px" }}>
                This page generates certificates for CEFN webinar participants. To receive your certificate, please complete the webinar evaluation form. You will be redirected here automatically upon completion.
              </p>
              <p style={{ color: "#888", marginTop: "24px", fontSize: "14px" }}>
                Questions? Contact <a href="mailto:forensicnursing@tamu.edu" style={{ color: "#500000" }}>forensicnursing@tamu.edu</a>
              </p>
            </div>
          </div>
        );
      }

      // Invalid webinar
      if (!webinar) {
        return (
          <div style={{ minHeight: "100vh", background: "#f5f3ef", fontFamily: "'Work Sans', sans-serif" }}>
            <div style={{ background: "#500000", padding: "20px 32px", color: "#fff", textAlign: "center" }}>
              <h1 style={{ margin: 0, fontSize: "20px", fontFamily: "'Oswald', sans-serif", letterSpacing: "1px" }}>Certificate Error</h1>
            </div>
            <div style={{ padding: "60px 24px", textAlign: "center", maxWidth: "600px", margin: "0 auto" }}>
              <h2 style={{ color: "#500000" }}>Invalid Certificate Link</h2>
              <p style={{ color: "#555", marginTop: "12px" }}>This certificate link is not valid. Please contact <a href="mailto:forensicnursing@tamu.edu" style={{ color: "#500000" }}>forensicnursing@tamu.edu</a> for assistance.</p>
            </div>
          </div>
        );
      }

      // CME not available
      if (data.creditType === "CME" && webinar.cmeHours == null) {
        return (
          <div style={{ minHeight: "100vh", background: "#f5f3ef", fontFamily: "'Work Sans', sans-serif" }}>
            <div style={{ background: "#500000", padding: "20px 32px", color: "#fff", textAlign: "center" }}>
              <h1 style={{ margin: 0, fontSize: "20px", fontFamily: "'Oswald', sans-serif", letterSpacing: "1px" }}>Certificate Error</h1>
            </div>
            <div style={{ padding: "60px 24px", textAlign: "center", maxWidth: "600px", margin: "0 auto" }}>
              <h2 style={{ color: "#500000" }}>CME Credit Not Available</h2>
              <p style={{ color: "#555", marginTop: "12px" }}>CME credit is not offered for this webinar. Please contact <a href="mailto:forensicnursing@tamu.edu" style={{ color: "#500000" }}>forensicnursing@tamu.edu</a> for assistance.</p>
            </div>
          </div>
        );
      }

      const handleDownload = async () => {
        setDownloading(true);
        try {
          const safeName = data.fullName.replace(/[^a-zA-Z0-9]/g, "_");
          await generatePDF("certificate-content", `Certificate_${safeName}_${data.creditType}.pdf`);
        } catch (err) {
          console.error("PDF generation failed:", err);
          setError("There was an error generating your certificate. Please try again or contact forensicnursing@tamu.edu.");
        } finally {
          setDownloading(false);
        }
      };

      return (
        <div style={{ minHeight: "100vh", background: "#f5f3ef", fontFamily: "'Work Sans', sans-serif" }}>
          <div style={{ background: "#500000", padding: "20px 32px", color: "#fff", textAlign: "center" }}>
            <h1 style={{ margin: 0, fontSize: "20px", fontFamily: "'Oswald', sans-serif", letterSpacing: "1px" }}>Your Certificate is Ready</h1>
            <p style={{ margin: "4px 0 0", fontSize: "13px", opacity: 0.8 }}>Texas A&M Center of Excellence in Forensic Nursing</p>
          </div>
          <div style={{ maxWidth: "1100px", margin: "24px auto", padding: "0 24px" }}>
            <div style={{ background: "#e8e5e0", borderRadius: "8px", padding: "24px", display: "flex", justifyContent: "center", overflow: "auto" }}>
              <div style={{ transform: "scale(0.65)", transformOrigin: "top center", boxShadow: "0 4px 20px rgba(0,0,0,0.15)" }}>
                <CertificatePreview data={data} webinar={webinar} />
              </div>
            </div>
            <div style={{ textAlign: "center", marginTop: "24px" }}>
              <button
                onClick={handleDownload}
                disabled={downloading}
                style={{
                  padding: "16px 56px", background: downloading ? "#7a4040" : "#500000", color: "#fff",
                  border: "none", borderRadius: "6px", fontSize: "16px", fontWeight: 600,
                  cursor: downloading ? "wait" : "pointer", fontFamily: "'Oswald', sans-serif",
                  textTransform: "uppercase", letterSpacing: "1.5px", transition: "background 0.2s",
                }}
              >
                {downloading ? "Generating PDF..." : "Download Certificate (PDF)"}
              </button>
              {error && <p style={{ color: "#c62828", marginTop: "12px", fontSize: "14px" }}>{error}</p>}
            </div>
            <p style={{ textAlign: "center", color: "#999", fontSize: "13px", marginTop: "20px" }}>
              If you experience any issues, please contact <a href="mailto:forensicnursing@tamu.edu" style={{ color: "#500000" }}>forensicnursing@tamu.edu</a>
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
